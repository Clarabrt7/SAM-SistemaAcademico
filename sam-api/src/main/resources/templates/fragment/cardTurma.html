<div th:fragment="cardTurma">
    <div class="col-md-12">
        <div class="card class-card h-100 shadow-sm border-0">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between mb-3">
                    <span class="tag-info fw-bold text-primary" th:text="${turma.disciplina.codigo}">CODIGO</span>
                
                    <!--Definir após interesse estar ok-->
                    <span class="badge bg-success-subtle text-success small">65% Ocupada</span>
                </div>
                
                <h5 class="fw-bold mb-1" th:text="${turma.disciplina.nome}">Nome da Disciplina</h5>
                <p class="text-muted small mb-4">
                    <!--Definir após interesse estar ok-->
                    <span th:text="${turma.nome}">Turma 01</span> <br>
                    <i class="fa fa-user-circle me-1"></i> Prof. <span th:text="${turma.professor.nome}">Nome do Professor</span>
                </p>

                <div class="d-flex align-items-center mb-4">
                    <div class="bg-light p-2 rounded-3 me-3 text-center w-25">
                        <!--Definir após turma estar ok-->
                        <small class="d-block fw-bold text-primary">24M12</small>
                        <small class="text-muted" style="font-size: 0.65rem;">Horário</small>
                    </div>
                    <div>
                        <small class="d-block text-muted" th:text="|Vagas Totais: ${turma.capacidade}|">Vagas Totais: 0</small>
                        <!--Definir após interesse estar ok-->
                        <small class="d-block text-muted">Interessados: 26</small>
                    </div>
                </div>

                <button class="btn btn-primary w-100 py-2 fw-bold">
                    <!--Definir após interesse estar ok-->
                    <i class="fa fa-plus me-2"></i> Adicionar à Simulação
                </button>
            </div>
        </div>
    </div>
</div>
